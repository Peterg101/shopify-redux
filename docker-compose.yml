services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitd
      POSTGRES_USER: fitd
      POSTGRES_PASSWORD: fitd_dev
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  db_service:
    build:
      context: .
      dockerfile: Dockerfile.python
      args: { SERVICE_DIR: db_service }
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://fitd:fitd_dev@postgres:5432/fitd
      FRONTEND_URL: http://localhost:3000
      AUTH_SERVICE_URL: http://auth_backend:2468
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on: [postgres]

  auth_backend:
    build:
      context: .
      dockerfile: Dockerfile.python
      args: { SERVICE_DIR: auth_backend }
    ports: ["2468:2468"]
    environment:
      REDIS_HOST: redis
      DB_SERVICE_URL: http://db_service:8000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: http://localhost:2468/auth/google/callback
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on: [redis, db_service]

  meshy_backend:
    build:
      context: .
      dockerfile: Dockerfile.python
      args: { SERVICE_DIR: meshy_backend }
    ports: ["1234:1234"]
    environment:
      REDIS_HOST: redis
      DB_SERVICE_URL: http://db_service:8000
      AUTH_SERVICE_URL: http://auth_backend:2468
      MESHY_API_KEY: ${MESHY_API_KEY}
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on: [redis, db_service, auth_backend]

  stripe_service:
    build:
      context: .
      dockerfile: Dockerfile.python
      args: { SERVICE_DIR: stripe_service }
    ports: ["100:100"]
    environment:
      DB_SERVICE_URL: http://db_service:8000
      AUTH_SERVICE_URL: http://auth_backend:2468
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_ENDPOINT_SECRET: ${STRIPE_ENDPOINT_SECRET}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on: [db_service, auth_backend]

  frontend:
    build:
      context: shopify-redux
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    environment:
      REACT_APP_DB_SERVICE: http://localhost:8000
      REACT_APP_AUTH_SERVICE: http://localhost:2468
      REACT_APP_MESHY_SERVICE: http://localhost:1234
      REACT_APP_STRIPE_SERVICE: http://localhost:100
    depends_on: [db_service, auth_backend]

volumes:
  pgdata:
