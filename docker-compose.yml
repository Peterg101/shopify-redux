services:
  # ── Infrastructure ──────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitd
      POSTGRES_USER: fitd
      POSTGRES_PASSWORD: fitd_dev
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitd"]
      interval: 2s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama

  # ── Backend Services ────────────────────────────────────────────

  api_service:
    build:
      context: .
      dockerfile: Dockerfile.python
      args: { SERVICE_DIR: api_service }
    ports: ["8000:8000"]
    environment:
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://fitd:fitd_dev@postgres:5432/fitd
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/google/callback
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: http://localhost:8000/auth/github/callback
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-FITD <noreply@fitd.dev>}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SHIPENGINE_API_KEY: ${SHIPENGINE_API_KEY}
      MEDIA_SERVICE_URL: http://media_service:1235
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  generation_service:
    build:
      context: .
      dockerfile: generation_service/Dockerfile
    ports: ["1234:1234"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/cad_work:/tmp/cad_work
    environment:
      HOST: "0.0.0.0"
      REDIS_HOST: redis
      DB_SERVICE_URL: http://api_service:8000
      STEP_SERVICE_URL: http://media_service:1235
      CAD_PROVIDER: ${CAD_PROVIDER:-ollama}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      OLLAMA_URL: http://ollama:11434/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MOCK_GENERATION: ${MOCK_GENERATION:-false}
      CAD_SANDBOX_IMAGE: fitd-cad-sandbox:latest
      CAD_WORK_DIR: /tmp/cad_work
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:1234/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      api_service:
        condition: service_healthy
      media_service:
        condition: service_healthy
      cad_sandbox:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  media_service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: media_service/Dockerfile
    ports: ["1235:1235"]
    environment:
      HOST: "0.0.0.0"
      FRONTEND_URL: http://localhost:3000
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: fitd-files
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:1235/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1.5G

  cad_sandbox:
    platform: linux/amd64
    build:
      context: .
      dockerfile: generation_service/Dockerfile.sandbox
    image: fitd-cad-sandbox:latest
    entrypoint: ["true"]
    restart: "no"

  # ── Frontend ────────────────────────────────────────────────────

  frontend:
    build:
      context: shopify-redux
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8000
        REACT_APP_GENERATION_URL: http://localhost:1234
        REACT_APP_MEDIA_URL: http://localhost:1235
        REACT_APP_MOCK_GENERATION: ${MOCK_GENERATION:-false}
    ports: ["3000:3000"]
    depends_on:
      api_service:
        condition: service_healthy

volumes:
  pgdata:
  minio_data:
  ollama_data:
  uploads:
