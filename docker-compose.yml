services:
  # ── Infrastructure ──────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitd
      POSTGRES_USER: fitd
      POSTGRES_PASSWORD: fitd_dev
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitd"]
      interval: 2s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama

  # ── Backend Services ────────────────────────────────────────────

  db_service:
    build:
      context: .
      dockerfile: Dockerfile.python
      args: { SERVICE_DIR: db_service }
    ports: ["8000:8000"]
    environment:
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://fitd:fitd_dev@postgres:5432/fitd
      FRONTEND_URL: http://localhost:3000
      AUTH_SERVICE_URL: http://db_service:8000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/google/callback
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SHIPENGINE_API_KEY: ${SHIPENGINE_API_KEY}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  generation_service:
    build:
      context: .
      dockerfile: generation_service/Dockerfile
    ports: ["1234:1234"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/cad_work:/tmp/cad_work
    environment:
      HOST: "0.0.0.0"
      REDIS_HOST: redis
      DB_SERVICE_URL: http://db_service:8000
      AUTH_SERVICE_URL: http://db_service:8000
      STEP_SERVICE_URL: http://step_service:1235
      MESHY_API_KEY: ${MESHY_API_KEY}
      CAD_PROVIDER: ${CAD_PROVIDER:-ollama}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      OLLAMA_URL: http://ollama:11434/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CAD_SANDBOX_IMAGE: fitd-cad-sandbox:latest
      CAD_WORK_DIR: /tmp/cad_work
    depends_on: [redis, ollama, db_service, step_service, cad_sandbox]

  step_service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: step_service/Dockerfile
    ports: ["1235:1235"]
    environment:
      HOST: "0.0.0.0"
      FRONTEND_URL: http://localhost:3000
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: fitd-files
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on: [minio]

  cad_sandbox:
    platform: linux/amd64
    build:
      context: .
      dockerfile: generation_service/Dockerfile.sandbox
    image: fitd-cad-sandbox:latest
    entrypoint: ["true"]
    restart: "no"

  # ── Frontend ────────────────────────────────────────────────────

  frontend:
    build:
      context: shopify-redux
      dockerfile: Dockerfile
      args:
        REACT_APP_DB_SERVICE: http://localhost:8000
        REACT_APP_AUTH_SERVICE: http://localhost:8000
        REACT_APP_MESHY_SERVICE: http://localhost:1234
        REACT_APP_MESHY_WEBSOCKET: ws://localhost:1234
        REACT_APP_STRIPE_SERVICE: http://localhost:8000
        REACT_APP_CAD_SERVICE: http://localhost:1234
        REACT_APP_CAD_WEBSOCKET: ws://localhost:1234
        REACT_APP_STEP_SERVICE: http://localhost:1235
    ports: ["3000:3000"]
    depends_on: [db_service]

volumes:
  pgdata:
  minio_data:
  ollama_data:
  uploads:
