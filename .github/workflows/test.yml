name: Tests
on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api_service, fitd_schemas]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install shared packages
        run: pip install ./fitd_schemas ./jwt_auth
      - name: Install service deps
        run: pip install -r ${{ matrix.service }}/requirements.txt
      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: python -m pytest tests/ --import-mode=importlib -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shopify-redux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: CI=true npx react-scripts test --watchAll=false
